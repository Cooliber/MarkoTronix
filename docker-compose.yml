services:
  # HVAC CRM UI
  hvac-ui:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./hvac-ui:/app
      - hvac-ui-node-modules:/app/node_modules
    ports:
      - "28000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${API_URL:-http://api:18000/api}
      - NEXT_PUBLIC_WEBSOCKET_URL=${WEBSOCKET_URL:-ws://api:18000/ws}
      - API_URL=${API_URL:-http://api:18000/api}
      - APP_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_APP_VERSION=1.0.0
      - NEXT_PUBLIC_BUILD_TIME=${BUILD_TIME:-2023-06-01T00:00:00Z}
    depends_on:
      - api
    networks:
      - hvac-network
    restart: unless-stopped
    command: sh -c "cd /app && npm run dev"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
      
  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:v2.45.0
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus-data:/prometheus
    ports:
      - "19090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - hvac-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
      
  # Grafana for visualization
  grafana:
    image: grafana/grafana:10.0.3
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    ports:
      - "13000:3000"
    depends_on:
      - prometheus
    networks:
      - hvac-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Mock API for development
  api:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./hvac-ui/mock-api:/app
    command: sh -c "npm install && npm start"
    ports:
      - "18000:18000"
    environment:
      - NODE_ENV=development
      - PORT=18000
    networks:
      - hvac-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:18000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Mail Ingest Service
  mail-ingest:
    build:
      context: ./mail-ingest-service
    volumes:
      - ./mail-ingest-service:/app
      - mail-attachments:/app/attachments
    ports:
      - "18001:8000"
    env_file:
      - ./mail-ingest-service/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/hvac_crm
      - REDIS_URL=redis://redis:6379/0
      # Comment out mail server settings to disable automatic mail checking
      # - MAIL_SERVER=imap.example.com
      # - MAIL_PORT=993
      # - MAIL_USERNAME=your-email@example.com
      # - MAIL_PASSWORD=your-password
      - MAIL_USE_TLS=true
      - MAIL_CHECK_INTERVAL=60
    depends_on:
      - redis
      - postgres
    networks:
      - hvac-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Offer Generation Service
  offer-generation:
    build:
      context: ./offer-generation
    volumes:
      - ./offer-generation:/app
      - offer-storage:/app/storage
    ports:
      - "18002:8000"
    env_file:
      - ./offer-generation/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/hvac_crm
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_DIR=/app/storage
      # Set to your actual API key or leave commented out for development
      # - OPENAI_API_KEY=your-openai-api-key
    depends_on:
      - redis
      - postgres
    networks:
      - hvac-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Link Service
  link-service:
    build:
      context: ./link-service
    volumes:
      - ./link-service:/app
      - link-storage:/app/storage
    ports:
      - "18003:8000"
    env_file:
      - ./link-service/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/hvac_crm
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-secret-key-for-development-only
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      # DocuSign configuration - uncomment and set for production
      # - DOCUSIGN_INTEGRATION_KEY=your-docusign-integration-key
      # - DOCUSIGN_USER_ID=your-docusign-user-id
      # - DOCUSIGN_ACCOUNT_ID=your-docusign-account-id
      # - DOCUSIGN_PRIVATE_KEY_PATH=/app/keys/docusign_private.key
      # HelloSign configuration - uncomment and set for production
      # - HELLOSIGN_API_KEY=your-hellosign-api-key
    depends_on:
      - redis
      - postgres
    networks:
      - hvac-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Redis for message queue
  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    networks:
      - hvac-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # PostgreSQL for local development
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hvac_crm
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - hvac-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  hvac-network:
    driver: bridge

volumes:
  mail-attachments:
  offer-storage:
  link-storage:
  redis-data:
  postgres-data:
  hvac-ui-node-modules:
  prometheus-data:
  grafana-data:
