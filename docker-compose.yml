services:
  # HVAC CRM UI
  hvac-ui:
    build:
      context: ./hvac-ui
      dockerfile: Dockerfile.dev
    volumes:
      - ./hvac-ui:/app
      - hvac-ui-node-modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${API_URL:-http://api:8000/api}
      - NEXT_PUBLIC_WEBSOCKET_URL=${WEBSOCKET_URL:-ws://api:8000/ws}
      - API_URL=${API_URL:-http://api:8000/api}
      - APP_ENV=${APP_ENV:-development}
      - NEXT_TELEMETRY_DISABLED=1
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - api
    networks:
      - hvac-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Mock API for development
  api:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./hvac-ui/mock-api:/app
    command: sh -c "npm install && npm start"
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
      - PORT=8000
    networks:
      - hvac-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Mail Ingest Service
  mail-ingest:
    build:
      context: ./mail-ingest-service
    volumes:
      - ./mail-ingest-service:/app
      - mail-attachments:/app/attachments
    ports:
      - "8001:8000"
    env_file:
      - ./mail-ingest-service/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/hvac_crm
      - REDIS_URL=redis://redis:6379/0
      # Comment out mail server settings to disable automatic mail checking
      # - MAIL_SERVER=imap.example.com
      # - MAIL_PORT=993
      # - MAIL_USERNAME=your-email@example.com
      # - MAIL_PASSWORD=your-password
      - MAIL_USE_TLS=true
      - MAIL_CHECK_INTERVAL=60
    depends_on:
      - redis
      - postgres
    networks:
      - hvac-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Offer Generation Service
  offer-generation:
    build:
      context: ./offer-generation
    volumes:
      - ./offer-generation:/app
      - offer-storage:/app/storage
    ports:
      - "8002:8000"
    env_file:
      - ./offer-generation/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/hvac_crm
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_DIR=/app/storage
      # Set to your actual API key or leave commented out for development
      # - OPENAI_API_KEY=your-openai-api-key
    depends_on:
      - redis
      - postgres
    networks:
      - hvac-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Link Service
  link-service:
    build:
      context: ./link-service
    volumes:
      - ./link-service:/app
      - link-storage:/app/storage
    ports:
      - "8003:8000"
    env_file:
      - ./link-service/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/hvac_crm
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-secret-key-for-development-only
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      # DocuSign configuration - uncomment and set for production
      # - DOCUSIGN_INTEGRATION_KEY=your-docusign-integration-key
      # - DOCUSIGN_USER_ID=your-docusign-user-id
      # - DOCUSIGN_ACCOUNT_ID=your-docusign-account-id
      # - DOCUSIGN_PRIVATE_KEY_PATH=/app/keys/docusign_private.key
      # HelloSign configuration - uncomment and set for production
      # - HELLOSIGN_API_KEY=your-hellosign-api-key
    depends_on:
      - redis
      - postgres
    networks:
      - hvac-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Redis for message queue
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - hvac-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # PostgreSQL for local development
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hvac_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - hvac-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  hvac-network:
    driver: bridge

volumes:
  mail-attachments:
  offer-storage:
  link-storage:
  redis-data:
  postgres-data: