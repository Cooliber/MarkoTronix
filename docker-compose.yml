version: '3.8'

services:
  hvac-ui:
    build:
      context: ./hvac-ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_URL=${API_URL:-http://api:3001/api}
      - APP_ENV=${APP_ENV:-production}
    restart: unless-stopped
    networks:
      - hvac-network

  # Add API service here when ready
  # api:
  #   build:
  #     context: ./api
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3001:3001"
  #   environment:
  #     - NODE_ENV=production
  #   restart: unless-stopped
  #   networks:
  #     - hvac-network

networks:
  hvac-network:
    driver: bridge