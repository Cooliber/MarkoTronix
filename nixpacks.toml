# Root nixpacks.toml file that redirects to the hvac-ui directory
[setup]
nixPkgs = ["nodejs_20", "npm"]

[phases.setup]
workdir = "./hvac-ui"

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"

[variables]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"

# Cache directories between builds
[[cache]]
path = "hvac-ui/node_modules"
key = "node_modules-{{ checksum 'hvac-ui/package-lock.json' }}-{{ checksum 'nixpacks.toml' }}"

[[cache]]
path = "hvac-ui/.next/cache"
key = "next-cache-{{ checksum 'hvac-ui/package-lock.json' }}-{{ checksum 'nixpacks.toml' }}"

# Note: Custom hooks from @uidotdev/usehooks have been implemented directly in the codebase
# under src/hooks/usehooks to avoid dependency issues
