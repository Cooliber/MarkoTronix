# Root nixpacks.toml for the entire MarkoTronix project
# This configuration is used when deploying the entire project

[phases.setup]
nixPkgs = ["nodejs", "npm", "python3", "python3Packages.pip", "gcc", "openssl", "postgresql", "redis"]
aptPkgs = [
  "ca-certificates", 
  "fonts-liberation", 
  "libasound2", 
  "libatk-bridge2.0-0", 
  "libatk1.0-0", 
  "libcups2", 
  "libdbus-1-3", 
  "libgbm1", 
  "libgtk-3-0", 
  "libnspr4", 
  "libnss3", 
  "libxcomposite1", 
  "libxdamage1", 
  "libxrandr2", 
  "libxss1", 
  "libxtst6", 
  "xdg-utils",
  "tesseract-ocr",
  "poppler-utils"
]

[phases.install]
cmds = [
  # Install frontend dependencies
  "cd hvac-ui && npm ci --prefer-offline --no-audit --no-fund",
  
  # Install Python dependencies for microservices
  "cd mail-ingest-service && pip install -r requirements.txt",
  "cd offer-generation && pip install -r requirements.txt",
  "cd link-service && pip install -r requirements.txt"
]
cacheDirectories = [
  "hvac-ui/.next/cache",
  "hvac-ui/node_modules/.cache"
]

[phases.build]
cmds = [
  # Build frontend
  "cd hvac-ui && npm run generate-icons && npm run build:prod",
  
  # Prepare Python services
  "cd mail-ingest-service && python -m compileall .",
  "cd offer-generation && python -m compileall .",
  "cd link-service && python -m compileall ."
]
dependsOn = ["install"]

[phases.setup.env]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"
NPM_CONFIG_PRODUCTION = "true"
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"

# Frontend service
[services.hvac-ui]
cmd = "cd hvac-ui && npm run start"
port = 3000
dependsOn = ["build"]

# Mail ingest service
[services.mail-ingest]
cmd = "cd mail-ingest-service && uvicorn main:app --host 0.0.0.0 --port 8001"
port = 8001
dependsOn = ["build"]

# Offer generation service
[services.offer-generation]
cmd = "cd offer-generation && uvicorn main:app --host 0.0.0.0 --port 8002"
port = 8002
dependsOn = ["build"]

# Link service
[services.link-service]
cmd = "cd link-service && uvicorn main:app --host 0.0.0.0 --port 8003"
port = 8003
dependsOn = ["build"]

[variables]
NIXPACKS_NODE_VERSION = "20.11.1"
NIXPACKS_PYTHON_VERSION = "3.10"
NIXPACKS_INSTALL_CMD = "echo 'Using custom install commands'"
NIXPACKS_BUILD_CMD = "echo 'Using custom build commands'"

[customizations]
buildImage = "node:20.11.1-alpine"
runtimeImage = "node:20.11.1-alpine"

# Health checks
[services.hvac-ui.healthcheck]
cmd = "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health"
interval = "30s"
timeout = "10s"
retries = 3
startPeriod = "15s"

[services.mail-ingest.healthcheck]
cmd = "curl -f http://localhost:8001/health"
interval = "30s"
timeout = "10s"
retries = 3
startPeriod = "15s"

[services.offer-generation.healthcheck]
cmd = "curl -f http://localhost:8002/health"
interval = "30s"
timeout = "10s"
retries = 3
startPeriod = "15s"

[services.link-service.healthcheck]
cmd = "curl -f http://localhost:8003/health"
interval = "30s"
timeout = "10s"
retries = 3
startPeriod = "15s"