version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-your-secret-encryption-key}
      - N8N_HVAC_API_URL=${N8N_HVAC_API_URL:-http://localhost:3000/api}
      - N8N_HVAC_API_KEY=${N8N_HVAC_API_KEY:-your-api-key}
      - N8N_SMTP_HOST=${N8N_SMTP_HOST:-smtp.example.com}
      - N8N_SMTP_PORT=${N8N_SMTP_PORT:-587}
      - N8N_SMTP_USER=${N8N_SMTP_USER:-user@example.com}
      - N8N_SMTP_PASS=${N8N_SMTP_PASS:-your-password}
      - N8N_S3_ENDPOINT=${N8N_S3_ENDPOINT:-https://s3.example.com}
      - N8N_S3_ACCESS_KEY=${N8N_S3_ACCESS_KEY:-your-access-key}
      - N8N_S3_SECRET_KEY=${N8N_S3_SECRET_KEY:-your-secret-key}
      - N8N_S3_BUCKET=${N8N_S3_BUCKET:-your-bucket}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/.n8n/workflows
    depends_on:
      - postgres
    networks:
      - n8n-network

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n
      - POSTGRES_DB=n8n
      - POSTGRES_NON_ROOT_USER=n8n_user
      - POSTGRES_NON_ROOT_PASSWORD=n8n_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - n8n-network

volumes:
  n8n_data:
  postgres_data:

networks:
  n8n-network:
    driver: bridge